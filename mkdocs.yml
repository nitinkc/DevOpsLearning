site_name: DevOps Learning
site_description: Comprehensive DevOps learning path from Docker to Kubernetes, Helm, and Flux
docs_dir: docs
repo_url: https://github.com/nitinkc/DevOpsLearning
repo_name: nitinkc/DevOpsLearning

theme:
  name: material
  features:
    # Navigation
    - navigation.tabs
#    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top           # Back-to-top button
    - navigation.footer        # Prev/Next page links
    # navigation.instant disabled — breaks live reload (re-enable for production builds)
    # - navigation.instant
    # - navigation.instant.progress
    # Search
    - search.suggest
    - search.highlight
    - search.share
    # Content
    - content.code.copy
    - content.code.annotate    # (1) style code annotations
    - content.tabs.link        # Sync tabs across page
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
      guess_lang: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      title: On this page
  - abbr
  - attr_list
  - md_in_html
  - pymdownx.snippets:
      base_path: docs
  - tables

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - Setup Guide: setup.md
  - Theory:
    - 01 DevOps Fundamentals: theory/01-devops-fundamentals.md
    - 02 Containerization & Docker: theory/02-containerization-docker.md
    - 03 Kubernetes Fundamentals: theory/03-kubernetes-fundamentals.md
    - 04 Workloads & Deployments: theory/04-workloads-and-deployments.md
    - 05 Networking & Storage: theory/05-networking-and-storage.md
    - "06 Helm: Package Management": theory/06-package-management-helm.md
    - 07 GitOps & Flux: theory/07-gitops-and-flux.md
    - 08 Observability: theory/08-observability.md
    - 09 Advanced Patterns: theory/09-advanced-patterns.md
  - Labs:
    - Labs Overview: labs/labs-overview.md
    - 00 Environment Setup: labs/00-environment-setup.md
    - 01 Docker Basics: labs/01-docker-basics.md
    - 02 Kubernetes Pods: labs/02-kubernetes-pods.md
    - 03 Deployments & Replicas: labs/03-deployments-and-replicas.md
    - 04 Services & Discovery: labs/04-services-and-discovery.md
    - 05 ConfigMaps & Secrets: labs/05-configmaps-and-secrets.md
    - 06 Helm Charts: labs/06-helm-charts.md
    - 07 Multi-Region Setup: labs/07-multi-region-setup.md
    - 08 Sidecars & Networking: labs/08-sidecars-and-networking.md
    - 09 Flux GitOps: labs/09-flux-gitops.md
    - 10 Observability: labs/10-observability-monitoring.md
    - 11 Troubleshooting: labs/11-troubleshooting.md
  - Interview Prep: interview-prep.md