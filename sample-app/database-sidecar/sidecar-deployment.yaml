apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server-with-sidecar
  namespace: production
  labels:
    app: api-server
    pattern: sidecar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
        pattern: sidecar
    spec:
      volumes:
      - name: shared-logs
        emptyDir: {}

      containers:
      # Main application container
      - name: api-server
        image: yourname/api-server:1.0.0
        ports:
        - containerPort: 5000
        env:
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: shared-logs
          mountPath: /var/log/app
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

      # Sidecar: log shipping container
      - name: log-shipper
        image: busybox:1.35
        command: ["sh", "-c", "tail -f /var/log/app/app.log"]
        volumeMounts:
        - name: shared-logs
          mountPath: /var/log/app
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

